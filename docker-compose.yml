services:

  # ── Base de Dados PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: stamps_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-mystamps_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mystamps_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stamps_network

  # ── Aplicação Django ───────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: stamps_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    networks:
      - stamps_network

  # ── Nginx (proxy reverso + ficheiros estáticos) ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: stamps_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    networks:
      - stamps_network

  # ── Portainer (gestão Docker via interface web) ────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: stamps_portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

# ── Volumes persistentes ───────────────────────────────────────────────────────
volumes:
  postgres_data:
  media_data:
  static_data:
  portainer_data:

# ── Rede interna ───────────────────────────────────────────────────────────────
networks:
  stamps_network:
    driver: bridge
