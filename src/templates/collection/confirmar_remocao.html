{% extends "base.html" %}

{% block titulo %}Remover Selo – Coleção{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h1 class="h5 mb-0"><i class="bi bi-exclamation-triangle me-1"></i> Confirmar Remoção</h1>
            </div>
            <div class="card-body">
                <p>Tens a certeza que pretendes remover
                    <strong>{{ item.stamp.titulo }}</strong> da tua coleção?
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i> Remover
                        </button>
                        <a href="{% url 'collection:colecao' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
